[observability]
enabled = true

[[ratelimits]]
name = "CALENDAR_RATE_LIMITER"
namespace_id = "2026062001"

  [ratelimits.simple]
  limit = 60
  period = 10

[[routes]]
pattern = "daymark.agentclub.dev/calendar/*"
zone_name = "agentclub.dev"
